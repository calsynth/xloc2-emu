name: build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      core_repo:
        description: "Phazerville repo URL to build a core from (empty = skip)"
        required: false
        default: ""
      core_ref:
        description: "Branch / tag / commit to build"
        required: false
        default: ""

jobs:
  test-linux:
    name: Headless firmware tests (Linux)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - name: Configure
        run: >
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_C_COMPILER=gcc -DCMAKE_CXX_COMPILER=g++
          -DXLOC2_BUILD_APP=OFF
      - name: Build (core module + headless)
        run: cmake --build build -j4 --target headless
      - name: Run headless tests (dlopen path)
        run: ./build/headless

  # The firmware core must build with GCC (Teensy toolchain parity; clang
  # rejects several firmware idioms), but the JUCE app needs AppleClang for
  # its ObjC++. Hence a two-pass build: Homebrew GCC for the core, then the
  # default toolchain for the app with the pre-built core bundled in.
  build-macos:
    name: macOS app (Apple Silicon)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - name: Find or install GCC
        run: |
          brew install gcc@14 || brew install gcc || true
          GXX="$(command -v g++-14 || true)"
          if [ -z "$GXX" ]; then
            GXX="$(ls /opt/homebrew/bin/g++-* /usr/local/bin/g++-* 2>/dev/null | sort -V | tail -1 || true)"
          fi
          [ -n "$GXX" ] || { echo "no Homebrew g++-NN found"; exit 1; }
          GCC="$(echo "$GXX" | sed 's/g++/gcc/')"
          command -v "$GCC" >/dev/null || GCC="$GXX"
          echo "Using $GXX / $GCC"
          echo "GXX=$GXX" >> "$GITHUB_ENV"
          echo "GCC=$GCC" >> "$GITHUB_ENV"
      - name: "Pass 1: core module with GCC"
        # No CMAKE_OSX_ARCHITECTURES here: GCC does not accept -arch; the
        # arm64 runner's GCC targets arm64 natively.
        run: |
          set -o pipefail
          cmake -S . -B build-core-ci -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER="$GCC" -DCMAKE_CXX_COMPILER="$GXX" \
            -DXLOC2_BUILD_APP=OFF
          cmake --build build-core-ci -j4 --target phz_core -- -k 2>&1 | tee core-build.log
      - name: Surface compile errors (pass 1)
        if: failure()
        run: |
          { echo '## Core build errors'; echo '```'; \
            grep -n -B2 -A6 "error:" core-build.log | head -120; \
            echo '```'; } >> "$GITHUB_STEP_SUMMARY" || true
      - name: Verify core dylib portability (no Homebrew runtime deps)
        run: |
          otool -L build-core-ci/phz_core.dylib
          if otool -L build-core-ci/phz_core.dylib | grep -E "/opt/homebrew|/usr/local"; then
            echo "ERROR: phz_core.dylib depends on Homebrew libraries" >&2
            exit 1
          fi
          lipo -info build-core-ci/phz_core.dylib
      - name: "Pass 2: app with AppleClang + bundled prebuilt core"
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=12.0 \
            -DXLOC2_BUILD_CORE=OFF \
            -DXLOC2_PREBUILT_CORE="$PWD/build-core-ci/phz_core.dylib"
          cmake --build build -j4 --target xloc2
      - name: Verify the core is bundled
        run: test -f build/app/xloc2_artefacts/Release/XLOC2.app/Contents/Resources/phz_core.dylib
      - name: Package
        run: |
          mkdir -p dist
          cp -R build/app/xloc2_artefacts/Release/XLOC2.app dist/
          # ad-hoc sign the whole bundle (incl. the GCC-built dylib) so
          # downloads only need right-click -> Open, not a quarantine fight
          codesign --force --deep --sign - dist/XLOC2.app
          cd dist && zip -ry XLOC2-macOS-arm64.zip XLOC2.app
      - uses: actions/upload-artifact@v4
        with:
          name: XLOC2-macOS-arm64
          path: dist/XLOC2-macOS-arm64.zip

  build-linux-app:
    name: Linux app (x86_64)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - name: Install JUCE build dependencies
        run: >
          sudo apt-get update && sudo apt-get install -y --no-install-recommends
          libasound2-dev libx11-dev libxext-dev libxrandr-dev libxinerama-dev
          libxcursor-dev libfreetype-dev libfontconfig1-dev
          libcurl4-openssl-dev pkg-config
      - name: Configure (single pass, GCC builds core + app)
        run: >
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_C_COMPILER=gcc -DCMAKE_CXX_COMPILER=g++
      - name: Build
        run: cmake --build build -j4 --target xloc2
      - name: Verify the core is bundled next to the binary
        run: test -f build/app/xloc2_artefacts/Release/phz_core.so
      - name: Package
        run: |
          mkdir -p dist/XLOC2-linux
          cp build/app/xloc2_artefacts/Release/XLOC2 dist/XLOC2-linux/
          cp build/app/xloc2_artefacts/Release/phz_core.so dist/XLOC2-linux/
          cat > dist/XLOC2-linux/README.txt <<'EOT'
          XLOC2 emulator (Linux x86_64)

          Run:  ./XLOC2
          Keep phz_core.so next to the XLOC2 binary (it is the firmware core;
          extra cores go in ~/.config/Calsynth/XLOC2/cores/).

          Needs standard desktop libraries (ALSA, X11, freetype, curl) --
          present on most distros; on a minimal Debian/Ubuntu:
            sudo apt install libasound2t64 libfreetype6 libfontconfig1 libcurl4
          EOT
          cd dist && tar czf XLOC2-linux-x86_64.tar.gz XLOC2-linux
      - uses: actions/upload-artifact@v4
        with:
          name: XLOC2-linux-x86_64
          path: dist/XLOC2-linux-x86_64.tar.gz

  # On-demand: build a loadable core module from any Phazerville repo/ref
  # (official release, fork, branch) for macOS arm64. Drop the artifact into
  # the app's cores folder and load it from the FW panel.
  build-core:
    name: Core module from repo/ref (macOS arm64)
    runs-on: macos-14
    if: github.event_name == 'workflow_dispatch' && inputs.core_repo != ''
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - name: Find or install GCC
        run: brew install gcc@14 || brew install gcc || true
      - name: Build core
        # build-core.sh auto-detects Homebrew g++-NN on Darwin (the core is
        # GCC-only) and links libstdc++/libgcc statically via CMake.
        run: >
          ./scripts/build-core.sh
          --repo "${{ inputs.core_repo }}"
          --ref "${{ inputs.core_ref }}"
          --out dist-core
          -- -DCMAKE_OSX_DEPLOYMENT_TARGET=12.0
      - name: Verify core dylib portability
        run: |
          otool -L dist-core/*.dylib
          if otool -L dist-core/*.dylib | grep -E "/opt/homebrew|/usr/local"; then
            echo "ERROR: core dylib depends on Homebrew libraries" >&2
            exit 1
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: phz_core-${{ inputs.core_ref }}-macos-arm64
          path: dist-core/*.dylib
